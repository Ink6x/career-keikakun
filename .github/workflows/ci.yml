name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: corepack pnpm prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/career_keikakun
      - name: Check
        run: corepack pnpm check
      - name: Unit tests
        run: corepack pnpm test
      - name: Build
        run: corepack pnpm build
      - name: Install Playwright browser
        run: corepack pnpm exec playwright install --with-deps chromium
      - name: E2E smoke
        run: corepack pnpm test:e2e -- --project=chromium
